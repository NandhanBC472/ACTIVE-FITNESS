<!DOCTYPE html>
<html>
<head>
<title>Active Fitnez</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--yellow:#facc15;--bg:#0b1220;--card:#121a2b;--muted:#9ca3af}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial;background:linear-gradient(180deg,#0b1220,#020617);color:#e5e7eb}
.hidden{display:none}
.nav{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:#020617;border-bottom:1px solid #1f2937}
.nav h3{margin:0;color:var(--yellow)}
.hero{text-align:center;padding:30px}
.hero img{width:120px;border-radius:50%}
.hero h1{color:var(--yellow)}
.section{padding:20px;margin:20px auto;width:90%;background:var(--card);border-radius:12px}
button{padding:8px 12px;border:none;border-radius:6px;background:var(--yellow);cursor:pointer}
button.danger{background:red;color:#fff}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #333;padding:8px;text-align:center}
th{background:#000;color:var(--yellow)}
.login-box{max-width:350px;margin:100px auto;background:#121a2b;padding:20px;border-radius:10px;text-align:center}
input{padding:10px;margin:8px;border-radius:6px;border:1px solid #333;background:#020617;color:#fff;width:90%}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-box">
<h2>Admin Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="login()">Login</button>
<p id="error" style="color:red"></p>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
<div class="nav">
<h3>Active Fitnez</h3>
<button onclick="logout()">Logout</button>
</div>

<div class="hero">
<img src="logo.png">
<h1>ACTIVE FITNEZ</h1>
</div>

<div class="section">
<h2>New Admission</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone (91xxxxxxxxxx)">
<select id="training">
<option>Gym</option><option>Cardio</option><option>Yoga</option>
</select>
<input type="date" id="date">
<button onclick="addMember()">Add</button>
</div>

<div class="section">
<h2>Members</h2>
<table id="table"></table>
</div>

<div class="section">
<h2>Payment History</h2>
<table id="historyTable"></table>
</div>

<div class="section">
<h2>Fees Due</h2>
<table id="dueTable"></table>
</div>
</div>

<script>
// LOGIN SYSTEM
const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

function login(){
let u=document.getElementById('username').value;
let p=document.getElementById('password').value;
if(u===ADMIN_USER && p===ADMIN_PASS){
localStorage.setItem('loggedIn', 'true');
showApp();
}else{
document.getElementById('error').innerText="Invalid credentials";
}
}

function logout(){
localStorage.removeItem('loggedIn');
location.reload();
}

function showApp(){
document.getElementById('loginPage').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');
render();
}

if(localStorage.getItem('loggedIn')==='true'){
showApp();
}

// DATA
let members = JSON.parse(localStorage.getItem('members')) || [];
let history = JSON.parse(localStorage.getItem('history')) || [];

function addMember(){
let name=nameEl().value;
let phone=phoneEl().value;
let training=trainingEl().value;
let date=dateEl().value;
if(!name||!phone||!date){alert('Fill all');return;}
members.push({name,phone,training,date});
save();
}

function markPaid(i){
let today=new Date().toISOString().split('T')[0];
let m=members[i];
history.push({name:m.name,phone:m.phone,date:today});
members[i].date=today;
save();
}

function sendWhatsApp(i){
let m=members[i];
let msg=`Hello ${m.name}, your gym fee is due. Please pay soon. - Active Fitnez`;
let url=`https://wa.me/${m.phone}?text=${encodeURIComponent(msg)}`;
window.open(url,'_blank');
}

function save(){
localStorage.setItem('members',JSON.stringify(members));
localStorage.setItem('history',JSON.stringify(history));
render();
}

function render(){
let table=document.getElementById('table');
let dueTable=document.getElementById('dueTable');
let historyTable=document.getElementById('historyTable');
let today=new Date();

table.innerHTML='<tr><th>Name</th><th>Phone</th><th>Training</th><th>Last Paid</th><th>Actions</th></tr>';
dueTable.innerHTML='<tr><th>Name</th><th>Phone</th><th>Action</th></tr>';
historyTable.innerHTML='<tr><th>Name</th><th>Phone</th><th>Paid Date</th></tr>';

members.forEach((m,i)=>{
let diff=(today-new Date(m.date))/(1000*60*60*24);

table.innerHTML+=`<tr>
<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.training}</td>
<td>${m.date}</td>
<td>
<button onclick="markPaid(${i})">Update Fees</button>
<button onclick="sendWhatsApp(${i})">WhatsApp</button>
</td>
</tr>`;

if(diff>30){
dueTable.innerHTML+=`<tr>
<td>${m.name}</td>
<td>${m.phone}</td>
<td><button onclick="sendWhatsApp(${i})">Send Reminder</button></td>
</tr>`;
}
});

history.forEach(h=>{
historyTable.innerHTML+=`<tr>
<td>${h.name}</td>
<td>${h.phone}</td>
<td>${h.date}</td>
</tr>`;
});
}

function nameEl(){return document.getElementById('name');}
function phoneEl(){return document.getElementById('phone');}
function trainingEl(){return document.getElementById('training');}
function dateEl(){return document.getElementById('date');}
</script>

</body>
</html>
